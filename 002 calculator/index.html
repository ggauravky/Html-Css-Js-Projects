<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <!-- Display Screen -->
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            
            <!-- Calculator Buttons -->
            <div class="buttons">
                <!-- Row 1: Function buttons -->
                <button class="btn btn-function" id="clear">AC</button>
                <button class="btn btn-function" id="delete">⌫</button>
                <button class="btn btn-function" id="percentage">%</button>
                <button class="btn btn-operator" id="divide">÷</button>
                
                <!-- Row 2: Numbers and multiply -->
                <button class="btn btn-number" data-number="7">7</button>
                <button class="btn btn-number" data-number="8">8</button>
                <button class="btn btn-number" data-number="9">9</button>
                <button class="btn btn-operator" id="multiply">×</button>
                
                <!-- Row 3: Numbers and subtract -->
                <button class="btn btn-number" data-number="4">4</button>
                <button class="btn btn-number" data-number="5">5</button>
                <button class="btn btn-number" data-number="6">6</button>
                <button class="btn btn-operator" id="subtract">−</button>
                
                <!-- Row 4: Numbers and add -->
                <button class="btn btn-number" data-number="1">1</button>
                <button class="btn btn-number" data-number="2">2</button>
                <button class="btn btn-number" data-number="3">3</button>
                <button class="btn btn-operator" id="add">+</button>
                
                <!-- Row 5: Zero, decimal and equals -->
                <button class="btn btn-number zero" data-number="0">0</button>
                <button class="btn btn-number" id="decimal">.</button>
                <button class="btn btn-equals" id="equals">=</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
